<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Search glow */
    .search-input:focus {
      outline: none;
      box-shadow: 0 0 0 1px #3b82f6, 0 0 20px rgba(59,130,246,0.18);
      border-color: #3b82f6;
    }

    /* Story card */
    .story-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      min-width: 148px;
      max-width: 148px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      flex-shrink: 0;
    }
    .story-card:hover {
      transform: translateY(-2px);
      border-color: #3a3a3a;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .story-card:active { transform: translateY(0px); }

    /* Trending card */
    .trending-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      min-width: 180px;
      max-width: 180px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      flex-shrink: 0;
    }
    .trending-card:hover {
      transform: translateY(-2px);
      border-color: #3a3a3a;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    /* Category story row */
    .cat-story-row {
      border-radius: 10px;
      transition: background 0.15s ease;
      cursor: pointer;
    }
    .cat-story-row:hover { background: #1e1e1e; }

    /* Horizontal scroll row */
    .scroll-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 8px;
    }
    .scroll-row > * { scroll-snap-align: start; }

    /* Timeline dot */
    .timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3b82f6;
      flex-shrink: 0;
      margin-top: 5px;
      box-shadow: 0 0 8px rgba(59,130,246,0.5);
    }
    .timeline-line {
      width: 1px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    /* Page transitions */
    .page {
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .page.hidden-page {
      opacity: 0;
      pointer-events: none;
      position: absolute;
      width: 100%;
      transform: translateX(24px);
    }
    .page.visible-page {
      opacity: 1;
      pointer-events: all;
      position: relative;
      transform: translateX(0);
    }

    /* Heart button */
    .heart-btn {
      transition: transform 0.15s ease;
    }
    .heart-btn:active { transform: scale(0.85); }
    .heart-btn.following svg { fill: #ef4444; stroke: #ef4444; }

    /* Badge pulse */
    .badge-new {
      animation: badge-pop 0.3s ease;
    }
    @keyframes badge-pop {
      0% { transform: scale(0.7); opacity:0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity:1; }
    }

    /* Category section */
    .cat-section {
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
    }

    /* Nav */
    .nav-item {
      color: #666;
      cursor: pointer;
      transition: color 0.15s;
      font-size: 14px;
      padding: 4px 12px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .nav-item:hover { color: #f5f5f5; background: #1a1a1a; }
    .nav-item.active { color: #f5f5f5; }

    /* Search bar */
    .search-bar {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      transition: all 0.2s ease;
    }

    /* Load more */
    .load-more-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      border-radius: 10px;
      padding: 10px 28px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
    }
    .load-more-btn:hover { border-color: #3b82f6; color: #3b82f6; }

    /* Section header */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
    }

    /* Responsive tweaks */
    @media (max-width: 640px) {
      .story-card { min-width: 134px; max-width: 134px; }
      .trending-card { min-width: 160px; max-width: 160px; }
    }
  </style>
</head>
<body class="min-h-screen">

<!-- ============================================================

  </div>

    </div>

  <!-- Trending -->

    </div>

  </section>

  <!-- Category Grid -->

    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="categories-grid">
      <!-- Injected by JS -->
    </div>
  </section>
</div>


<!-- ============================================================
     TIMELINE / STORY DETAIL PAGE
     ============================================================ -->
<div id="timeline-page" class="page hidden-page max-w-2xl mx-auto px-4 pb-16">

      <button id="follow-btn" class="heart-btn flex items-center gap-2 px-4 py-2 rounded-full border border-gray-700 text-sm font-medium transition-all hover:border-red-500 hover:text-red-400 text-gray-400" onclick="toggleFollow(this)">

    <!-- Injected by JS -->
  </div>

  <div class="flex justify-center mt-8">
    <button class="load-more-btn">Load more ↓</button>
  </div>
</div>

// RENDER — Your Stories

function renderYourStories() {
  const container = document.getElementById('your-stories-row');
  container.innerHTML = yourStories.map(s => `
    <div class="story-card p-3.5" onclick="openTimeline('${s.id}')">
      <div class="flex items-start justify-between mb-3">
        <span class="text-xl">${s.icon}</span>
        ${s.newCount > 0 ? `<span class="badge-new inline-flex items-center justify-center text-xs font-bold rounded-full px-2 py-0.5" style="background:${s.color}22;color:${s.color}">${s.newCount}</span>` : ''}
      </div>
      <div class="font-semibold text-sm leading-tight mb-1">${s.name}</div>
      <div class="text-xs text-gray-600">${s.timeAgo}</div>
      <div class="mt-2.5 h-0.5 rounded-full" style="background: linear-gradient(90deg, ${s.color}88, transparent); width: 40px"></div>
    </div>
  `).join('');
}

// ============================================================
// RENDER — Trending
// ============================================================
function renderTrending() {
  const container = document.getElementById('trending-row');
  container.innerHTML = trending.map((t, i) => {
    const heatColor = t.heat > 80 ? '#ef4444' : t.heat > 60 ? '#f97316' : '#f59e0b';
    const rank = i + 1;
    return `
      <div class="trending-card p-3.5" onclick="openTimeline('${t.id}')">
        <div class="flex items-center gap-2 mb-2">
          <span class="text-xs font-bold text-gray-700">#${rank}</span>
          <span class="text-lg">${t.icon}</span>
        </div>
        <div class="font-semibold text-sm leading-tight mb-2">${t.name}</div>
        <div class="text-xs text-gray-600 mb-2">${t.articles.toLocaleString()} articles</div>
        <div class="w-full bg-gray-800 rounded-full h-1">
          <div class="h-1 rounded-full" style="width:${t.heat}%;background:${heatColor}"></div>
        </div>
      </div>
    `;
  }).join('');
}

                ${s.hot ? `<span class="text-xs" style="color:${cat.color}">●</span>` : ''}

              <div class="text-xs text-gray-600">${s.count.toLocaleString()} articles · ${s.timeAgo} ago</div>

            <svg class="w-3 h-3 text-gray-700 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">

// RENDER — Timeline entries
// ============================================================
function renderTimeline(data) {
  const container = document.getElementById('timeline-entries');
  container.innerHTML = data.entries.map((entry, i) => {
    const isLast = i === data.entries.length - 1;
    return `
      <div class="flex gap-4">
        <div class="flex flex-col items-center pt-1">
          <div class="timeline-dot"></div>
          ${!isLast ? `<div class="timeline-line flex-1 my-1" style="min-height:40px"></div>` : ''}
        </div>
        <div class="pb-6 flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs text-gray-600">${entry.time}</span>
            <span class="text-xs font-medium text-blue-400">${entry.source}</span>
          </div>
          <p class="text-sm font-semibold leading-snug text-gray-100 mb-1.5">"${entry.headline}"</p>
          ${entry.summary ? `<p class="text-xs text-gray-500 leading-relaxed">${entry.summary}</p>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

// ============================================================
// NAVIGATION
// ============================================================
let currentFollowState = {};

function openTimeline(storyId) {
  const data = timelines[storyId] || {
    icon: '📰', title: storyId.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
    articles: Math.floor(Math.random()*500+50),
    since: 'Mar 2026', newCount: 0, following: false,
    entries: [
      { time: '2h ago',    source: 'Reuters', headline: 'Developing story — check back for updates', summary: 'Our tracking system is aggregating the latest coverage across major outlets.' },
      { time: 'Yesterday', source: 'AP',      headline: 'Background: How this story developed', summary: null },
    ]
  };

  // Update header
  document.getElementById('story-icon').textContent = data.icon;
  document.getElementById('story-title').textContent = data.title;
  document.getElementById('story-meta').textContent = `${data.articles.toLocaleString()} articles · Tracking since ${data.since}`;
  document.getElementById('story-new-badge').textContent = data.newCount > 0 ? `${data.newCount} new today` : 'Up to date';

  // Follow state
  const followBtn = document.getElementById('follow-btn');
  const followText = document.getElementById('follow-text');
  const isFollowing = currentFollowState[storyId] !== undefined ? currentFollowState[storyId] : data.following;
  followBtn.dataset.storyId = storyId;
  updateFollowBtn(followBtn, followText, isFollowing);

  renderTimeline(data);
  showPage('timeline');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateFollowBtn(btn, textEl, isFollowing) {
  const svg = btn.querySelector('svg');
  if (isFollowing) {
    btn.classList.add('following');
    btn.style.borderColor = '#ef4444';
    btn.style.color = '#ef4444';
    textEl.textContent = 'Following';
    svg.setAttribute('fill', '#ef4444');
    svg.setAttribute('stroke', '#ef4444');
  } else {
    btn.classList.remove('following');
    btn.style.borderColor = '';
    btn.style.color = '';
    textEl.textContent = 'Follow';
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
  }
}

function toggleFollow(btn) {
  const storyId = btn.dataset.storyId;
  const textEl = document.getElementById('follow-text');
  const currentState = currentFollowState[storyId] !== undefined
    ? currentFollowState[storyId]
    : (timelines[storyId]?.following || false);
  const newState = !currentState;
  currentFollowState[storyId] = newState;
  updateFollowBtn(btn, textEl, newState);

  // Micro-bounce animation
  btn.style.transform = 'scale(0.9)';
  setTimeout(() => btn.style.transform = '', 150);
}

function showPage(page) {
  const home = document.getElementById('home-page');
  const timeline = document.getElementById('timeline-page');
  if (page === 'timeline') {
    home.classList.remove('visible-page');
    home.classList.add('hidden-page');
    timeline.classList.remove('hidden-page');
    timeline.classList.add('visible-page');
  } else {
    timeline.classList.remove('visible-page');
    timeline.classList.add('hidden-page');
    home.classList.remove('hidden-page');
    home.classList.add('visible-page');
  }
}

// Back button
document.getElementById('back-btn').addEventListener('click', () => {
  showPage('home');
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Search focus effect
const searchInput = document.getElementById('search-input');
searchInput.addEventListener('focus', () => {
  searchInput.closest('.search-bar').style.transform = 'scale(1.01)';
});
searchInput.addEventListener('blur', () => {
  searchInput.closest('.search-bar').style.transform = '';
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    if (!document.getElementById('timeline-page').classList.contains('hidden-page')) {
      showPage('home');
    }
    searchInput.blur();
  }
});

// ============================================================

renderYourStories();
renderTrending();
renderCategories();
</script>
